<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Calculator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="calculator-container">
        <h1> Calculator</h1>
        <div class="calculator">
            <input type="text" id="display" disabled placeholder="0">
            <div class="buttons">
                <button class="btn clear" id="clear" style="grid-column: span 3;">C</button>
                <button class="btn operator" data-value="/">/</button>

                <button class="btn number" data-value="7">7</button>
                <button class="btn number" data-value="8">8</button>
                <button class="btn number" data-value="9">9</button>
                <button class="btn operator" data-value="*">&times;</button>
                
                <button class="btn number" data-value="4">4</button>
                <button class="btn number" data-value="5">5</button>
                <button class="btn number" data-value="6">6</button>
                <button class="btn operator" data-value="-">-</button>

                <button class="btn number" data-value="1">1</button>
                <button class="btn number" data-value="2">2</button>
                <button class="btn number" data-value="3">3</button>
                <button class="btn operator" data-value="+">+</button>
                
                <button class="btn number zero" data-value="0" style="grid-column: span 2;">0</button>
                <button class="btn number" data-value=".">.</button>
                <button class="btn equal" id="calculate">=</button>
            </div>
        </div>
        <p class="error-message" id="error-message"></p>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
